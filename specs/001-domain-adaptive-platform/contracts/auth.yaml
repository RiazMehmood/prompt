openapi: 3.1.0
info:
  title: Authentication API
  version: 1.0.0

paths:
  /auth/signup/email:
    post:
      summary: Sign up with email/password
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
                - role_id
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: Min 8 chars, 1 uppercase, 1 number, 1 special char
                full_name:
                  type: string
                role_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Verification code sent to email
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  message:
                    type: string
                    example: "Verification code sent to email"
                  expires_in:
                    type: integer
                    example: 600
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/Error'

  /auth/signup/phone:
    post:
      summary: Sign up with phone number
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone_number
                - full_name
                - role_id
              properties:
                phone_number:
                  type: string
                  pattern: '^\+92-3\d{2}-\d{7}$'
                  example: "+92-300-1234567"
                full_name:
                  type: string
                role_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: OTP sent to phone
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  message:
                    type: string
                    example: "OTP sent to phone"
                  expires_in:
                    type: integer
                    example: 300
        '400':
          description: Validation error
        '409':
          description: Phone already registered

  /auth/signup/google:
    post:
      summary: Sign up with Google OAuth
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - google_token
                - role_id
              properties:
                google_token:
                  type: string
                  description: Google OAuth ID token
                role_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: User created and logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: './openapi.yaml#/components/schemas/User'
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                    example: 900
        '400':
          description: Invalid Google token
        '409':
          description: Email already registered

  /auth/verify/email:
    post:
      summary: Verify email with code
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - code
              properties:
                user_id:
                  type: string
                  format: uuid
                code:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
      responses:
        '200':
          description: Email verified, user logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: './openapi.yaml#/components/schemas/User'
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
        '400':
          description: Invalid or expired code
        '429':
          description: Too many attempts, blocked for 15 minutes

  /auth/verify/phone:
    post:
      summary: Verify phone with OTP
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - otp
              properties:
                user_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: Phone verified, user logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: './openapi.yaml#/components/schemas/User'
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        '400':
          description: Invalid or expired OTP
        '429':
          description: Too many attempts

  /auth/resend-code:
    post:
      summary: Resend verification code
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - method
              properties:
                user_id:
                  type: string
                  format: uuid
                method:
                  type: string
                  enum: [email, phone]
      responses:
        '200':
          description: Code resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  expires_in:
                    type: integer
        '429':
          description: Too many resend attempts (60-second cooldown)

  /auth/login:
    post:
      summary: Login with email/password or phone
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                phone_number:
                  type: string
                password:
                  type: string
              oneOf:
                - required: [email, password]
                - required: [phone_number]
      responses:
        '200':
          description: Login successful (or OTP sent for phone login)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      user:
                        $ref: './openapi.yaml#/components/schemas/User'
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                  - type: object
                    properties:
                      message:
                        type: string
                        example: "OTP sent to phone"
                      user_id:
                        type: string
                        format: uuid
        '401':
          description: Invalid credentials
        '403':
          description: Account blocked or suspended

  /auth/refresh:
    post:
      summary: Refresh access token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      summary: Logout (invalidate tokens)
      tags: [Authentication]
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"

  /auth/me:
    get:
      summary: Get current user profile
      tags: [Authentication]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/User'
        '401':
          description: Unauthorized

  /auth/link-phone:
    post:
      summary: Link phone number to existing account
      tags: [Authentication]
      description: Allows users who signed up with email/Google to add phone number for payment gateways
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone_number
              properties:
                phone_number:
                  type: string
                  pattern: '^\+92-3\d{2}-\d{7}$'
      responses:
        '200':
          description: OTP sent to phone for verification
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  expires_in:
                    type: integer
        '409':
          description: Phone number already registered to another account

  /auth/verify-linked-phone:
    post:
      summary: Verify linked phone number
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otp
              properties:
                otp:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: Phone number linked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: './openapi.yaml#/components/schemas/User'
        '400':
          description: Invalid OTP

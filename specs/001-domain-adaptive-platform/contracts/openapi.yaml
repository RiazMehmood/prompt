openapi: 3.1.0
info:
  title: Domain-Adaptive Multi-Tenant Agentic Platform API
  version: 1.0.0
  description: |
    API for a multi-tenant SaaS platform serving multiple professional domains (Lawyers, Teachers, Doctors, Engineers, Officers)
    in Pakistan with role-based RAG, subscription management, and premium add-ons.
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: http://localhost:8000/v1
    description: Development server

security:
  - BearerAuth: []

tags:
  - name: Authentication
    description: User signup, login, verification
  - name: Subscriptions
    description: Subscription management and payments
  - name: Documents
    description: Document generation and management
  - name: RAG
    description: RAG queries and chat interface
  - name: Admin
    description: Admin dashboard and role management
  - name: Exam Prep
    description: Medical exam preparation (premium add-on)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: "validation_error"
        message:
          type: string
          example: "Invalid email format"
        details:
          type: object
          additionalProperties: true

    User:
      type: object
      required:
        - user_id
        - auth_method
        - full_name
        - role_id
        - account_status
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          nullable: true
        phone_number:
          type: string
          pattern: '^\+92-3\d{2}-\d{7}$'
          nullable: true
        auth_method:
          type: string
          enum: [email, phone, google]
        full_name:
          type: string
        role_id:
          type: string
          format: uuid
        account_status:
          type: string
          enum: [active, blocked, suspended, deleted]
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      required:
        - role_id
        - role_name
        - display_name
        - category
      properties:
        role_id:
          type: string
          format: uuid
        role_name:
          type: string
          example: "doctor"
        display_name:
          type: string
          example: "Medical Doctor"
        category:
          type: string
          example: "healthcare"
        description:
          type: string
        ai_persona_prompt:
          type: string
        sidebar_features:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    SubscriptionPlan:
      type: object
      required:
        - plan_id
        - role_id
        - tier
        - monthly_price
      properties:
        plan_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        tier:
          type: string
          enum: [basic, pro, premium]
        monthly_price:
          type: number
          format: decimal
        six_month_price:
          type: number
          format: decimal
        yearly_price:
          type: number
          format: decimal
        features:
          type: object
          properties:
            documents_limit:
              type: integer
              nullable: true
            queries_limit:
              type: integer
              nullable: true
            storage_limit_mb:
              type: integer
            priority_support:
              type: boolean
            ai_model_tier:
              type: string
              enum: [basic, pro, premium]
        trial_duration_days:
          type: integer
          enum: [7, 14, 21, 30]
        trial_documents_limit:
          type: integer
        trial_queries_limit:
          type: integer

    UserSubscription:
      type: object
      required:
        - subscription_id
        - user_id
        - tier
        - status
      properties:
        subscription_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        tier:
          type: string
          enum: [basic, pro, premium]
        billing_cycle:
          type: string
          enum: [monthly, six_month, yearly]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [trial, active, expired, cancelled, suspended]
        payment_method:
          type: string
          enum: [jazzcash, easypaisa, card]
          nullable: true
        auto_renew:
          type: boolean
        documents_used:
          type: integer
        queries_used:
          type: integer
        storage_used_mb:
          type: number
          format: decimal

    PaymentTransaction:
      type: object
      required:
        - transaction_id
        - amount
        - payment_method
        - status
      properties:
        transaction_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        amount:
          type: number
          format: decimal
        currency:
          type: string
          default: "PKR"
        payment_method:
          type: string
          enum: [jazzcash, easypaisa, card]
        payment_gateway:
          type: string
          enum: [jazzcash, easypaisa, stripe]
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        failure_reason:
          type: string
          nullable: true
        payment_date:
          type: string
          format: date-time
          nullable: true

    Document:
      type: object
      required:
        - document_id
        - title
        - category
        - status
      properties:
        document_id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, needs_manual_review]
        quality_score:
          type: integer
          minimum: 0
          maximum: 100
        is_sample_template:
          type: boolean
        created_at:
          type: string
          format: date-time

    GeneratedDocument:
      type: object
      required:
        - document_id
        - document_type
        - file_path
      properties:
        document_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        document_type:
          type: string
        file_path:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time

    ChatMessage:
      type: object
      required:
        - role
        - content
        - timestamp
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time
        confidence_score:
          type: number
          format: float
          minimum: 0
          maximum: 1
        ai_model_used:
          type: string

    ChatSession:
      type: object
      required:
        - session_id
        - messages
      properties:
        session_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        analysis_results:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        last_active:
          type: string
          format: date-time

    ExamQuestion:
      type: object
      required:
        - question_id
        - subject
        - topic
        - question_text
        - options
      properties:
        question_id:
          type: string
          format: uuid
        subject:
          type: string
        topic:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        question_text:
          type: string
        options:
          type: array
          items:
            type: object
            properties:
              option:
                type: string
              text:
                type: string
              is_correct:
                type: boolean
        explanation:
          type: string
        references:
          type: string

    ExamAttempt:
      type: object
      required:
        - attempt_id
        - mode
        - subject
      properties:
        attempt_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        mode:
          type: string
          enum: [practice, test, review]
        subject:
          type: string
        questions:
          type: array
          items:
            type: string
            format: uuid
        answers:
          type: object
          additionalProperties:
            type: string
        score:
          type: integer
        time_taken:
          type: integer
        time_limit:
          type: integer
        performance_breakdown:
          type: object
          additionalProperties:
            type: object
            properties:
              correct:
                type: integer
              total:
                type: integer
              percentage:
                type: number

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time

  # Authentication endpoints defined in auth.yaml
  # Subscription endpoints defined in subscriptions.yaml
  # Document endpoints defined in documents.yaml
  # RAG endpoints defined in rag.yaml
  # Admin endpoints defined in admin.yaml
  # Exam prep endpoints defined in exam_prep.yaml

openapi: 3.1.0
info:
  title: Admin Dashboard API
  version: 1.0.0

paths:
  /admin/dashboard:
    get:
      summary: Get admin dashboard overview
      tags: [Admin]
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: object
                    properties:
                      total:
                        type: integer
                      active:
                        type: integer
                      trial:
                        type: integer
                      blocked:
                        type: integer
                      new_this_month:
                        type: integer
                  subscriptions:
                    type: object
                    properties:
                      active:
                        type: integer
                      trial:
                        type: integer
                      expired:
                        type: integer
                      cancelled:
                        type: integer
                      revenue_this_month:
                        type: number
                        format: decimal
                      revenue_projection:
                        type: number
                        format: decimal
                  usage:
                    type: object
                    properties:
                      documents_generated:
                        type: integer
                      queries_processed:
                        type: integer
                      storage_used_gb:
                        type: number
                        format: decimal
                      ai_api_calls:
                        type: integer
                      cache_hit_rate:
                        type: number
                        format: float
                  costs:
                    type: object
                    properties:
                      infrastructure:
                        type: number
                        format: decimal
                      ai_api:
                        type: number
                        format: decimal
                      storage:
                        type: number
                        format: decimal
                      total:
                        type: number
                        format: decimal
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        severity:
                          type: string
                          enum: [info, warning, critical]
                        message:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
        '403':
          description: Admin access required

  /admin/users:
    get:
      summary: List all users with filters
      tags: [Admin]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: role_id
          in: query
          schema:
            type: string
            format: uuid
        - name: account_status
          in: query
          schema:
            type: string
            enum: [active, blocked, suspended, deleted]
        - name: subscription_status
          in: query
          schema:
            type: string
            enum: [trial, active, expired, cancelled, suspended]
        - name: search
          in: query
          schema:
            type: string
            description: Search by name, email, or phone
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      allOf:
                        - $ref: './openapi.yaml#/components/schemas/User'
                        - type: object
                          properties:
                            subscription:
                              $ref: './openapi.yaml#/components/schemas/UserSubscription'
                            usage:
                              type: object
                              properties:
                                documents_used:
                                  type: integer
                                queries_used:
                                  type: integer
                                storage_used_mb:
                                  type: number
                  total:
                    type: integer
        '403':
          description: Admin access required

  /admin/users/{user_id}:
    get:
      summary: Get detailed user information
      tags: [Admin]
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: './openapi.yaml#/components/schemas/User'
                  subscription:
                    $ref: './openapi.yaml#/components/schemas/UserSubscription'
                  payment_history:
                    type: array
                    items:
                      $ref: './openapi.yaml#/components/schemas/PaymentTransaction'
                  activity:
                    type: object
                    properties:
                      last_login:
                        type: string
                        format: date-time
                      documents_generated:
                        type: integer
                      queries_made:
                        type: integer
                      chat_sessions:
                        type: integer
        '403':
          description: Admin access required
        '404':
          description: User not found

    patch:
      summary: Update user account status
      tags: [Admin]
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                account_status:
                  type: string
                  enum: [active, blocked, suspended]
                reason:
                  type: string
                  description: Required for blocked/suspended
      responses:
        '200':
          description: User updated
        '400':
          description: Invalid status or missing reason
        '403':
          description: Admin access required
        '404':
          description: User not found

  /admin/roles:
    get:
      summary: List all roles
      tags: [Admin]
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: './openapi.yaml#/components/schemas/Role'
                    - type: object
                      properties:
                        user_count:
                          type: integer
                        subscription_plans:
                          type: array
                          items:
                            $ref: './openapi.yaml#/components/schemas/SubscriptionPlan'
        '403':
          description: Admin access required

    post:
      summary: Create new role
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role_name
                - display_name
                - category
              properties:
                role_name:
                  type: string
                  pattern: '^[a-z_]+$'
                  example: "pharmacist"
                display_name:
                  type: string
                  example: "Pharmacist"
                category:
                  type: string
                  example: "healthcare"
                description:
                  type: string
                ai_persona_prompt:
                  type: string
                  description: System prompt for AI agent
                sidebar_features:
                  type: array
                  items:
                    type: string
                  example: ["chat", "documents", "prescriptions"]
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/Role'
        '400':
          description: Validation error
        '403':
          description: Admin access required
        '409':
          description: Role name already exists

  /admin/roles/{role_id}:
    get:
      summary: Get role details
      tags: [Admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './openapi.yaml#/components/schemas/Role'
                  - type: object
                    properties:
                      user_count:
                        type: integer
                      subscription_plans:
                        type: array
                        items:
                          $ref: './openapi.yaml#/components/schemas/SubscriptionPlan'
        '403':
          description: Admin access required
        '404':
          description: Role not found

    put:
      summary: Update role
      tags: [Admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                description:
                  type: string
                ai_persona_prompt:
                  type: string
                sidebar_features:
                  type: array
                  items:
                    type: string
                is_active:
                  type: boolean
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/Role'
        '400':
          description: Validation error
        '403':
          description: Admin access required
        '404':
          description: Role not found

    delete:
      summary: Delete role
      tags: [Admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Role deleted
        '403':
          description: Admin access required
        '404':
          description: Role not found
        '409':
          description: Cannot delete role with active users

  /admin/analytics/revenue:
    get:
      summary: Get revenue analytics
      tags: [Admin]
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
      responses:
        '200':
          description: Revenue analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_revenue:
                    type: number
                    format: decimal
                  by_period:
                    type: array
                    items:
                      type: object
                      properties:
                        period:
                          type: string
                        revenue:
                          type: number
                          format: decimal
                        transactions:
                          type: integer
                  by_role:
                    type: object
                    additionalProperties:
                      type: number
                      format: decimal
                  by_tier:
                    type: object
                    additionalProperties:
                      type: number
                      format: decimal
                  by_payment_method:
                    type: object
                    additionalProperties:
                      type: number
                      format: decimal
        '403':
          description: Admin access required

  /admin/analytics/usage:
    get:
      summary: Get usage analytics
      tags: [Admin]
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Usage analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents_generated:
                    type: integer
                  queries_processed:
                    type: integer
                  chat_sessions:
                    type: integer
                  active_users:
                    type: integer
                  by_role:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        documents:
                          type: integer
                        queries:
                          type: integer
                        users:
                          type: integer
        '403':
          description: Admin access required

  /admin/analytics/costs:
    get:
      summary: Get cost analytics
      tags: [Admin]
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Cost analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cost:
                    type: number
                    format: decimal
                  infrastructure:
                    type: number
                    format: decimal
                  ai_api:
                    type: object
                    properties:
                      total:
                        type: number
                        format: decimal
                      by_provider:
                        type: object
                        additionalProperties:
                          type: number
                          format: decimal
                      by_model:
                        type: object
                        additionalProperties:
                          type: number
                          format: decimal
                  storage:
                    type: number
                    format: decimal
                  bandwidth:
                    type: number
                    format: decimal
                  cost_per_user:
                    type: number
                    format: decimal
                  profit_margin:
                    type: number
                    format: float
        '403':
          description: Admin access required

  /admin/alerts/configure:
    post:
      summary: Configure admin alerts
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email_recipients:
                  type: array
                  items:
                    type: string
                    format: email
                slack_webhook_url:
                  type: string
                  format: uri
                thresholds:
                  type: object
                  properties:
                    cost_budget_percentage:
                      type: integer
                      default: 80
                      description: Alert when costs reach this % of budget
                    error_rate_percentage:
                      type: number
                      default: 5.0
                      description: Alert when error rate exceeds this %
                    response_time_ms:
                      type: integer
                      default: 5000
                      description: Alert when p95 response time exceeds this
      responses:
        '200':
          description: Alert configuration updated
        '400':
          description: Invalid configuration
        '403':
          description: Admin access required

  /admin/audit-logs:
    get:
      summary: Get audit logs
      tags: [Admin]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        log_id:
                          type: string
                          format: uuid
                        user_id:
                          type: string
                          format: uuid
                        action:
                          type: string
                        resource_type:
                          type: string
                        resource_id:
                          type: string
                        details:
                          type: object
                          additionalProperties: true
                        ip_address:
                          type: string
                        user_agent:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                  total:
                    type: integer
        '403':
          description: Admin access required

openapi: 3.1.0
info:
  title: Subscription Management API
  version: 1.0.0

paths:
  /subscriptions/plans:
    get:
      summary: Get available subscription plans for user's role
      tags: [Subscriptions]
      security: []
      parameters:
        - name: role_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of subscription plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './openapi.yaml#/components/schemas/SubscriptionPlan'

  /subscriptions/current:
    get:
      summary: Get current user subscription
      tags: [Subscriptions]
      responses:
        '200':
          description: Current subscription details
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/UserSubscription'
        '404':
          description: No active subscription

  /subscriptions/start-trial:
    post:
      summary: Start free trial
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - plan_id
              properties:
                plan_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Trial started
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/UserSubscription'
        '400':
          description: Trial already used or invalid plan
        '409':
          description: Active subscription exists

  /subscriptions/subscribe:
    post:
      summary: Create paid subscription
      tags: [Subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - plan_id
                - billing_cycle
                - payment_method
              properties:
                plan_id:
                  type: string
                  format: uuid
                billing_cycle:
                  type: string
                  enum: [monthly, six_month, yearly]
                payment_method:
                  type: string
                  enum: [jazzcash, easypaisa, card]
                auto_renew:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Subscription created, payment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription_id:
                    type: string
                    format: uuid
                  payment_url:
                    type: string
                    description: Redirect URL for payment gateway
                  transaction_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid plan or payment method
        '409':
          description: Active subscription exists

  /subscriptions/{subscription_id}/cancel:
    post:
      summary: Cancel subscription
      tags: [Subscriptions]
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  enum: [too_expensive, not_useful, switching_service, other]
                feedback:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Subscription cancelled (remains active until end date)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  end_date:
                    type: string
                    format: date
                  data_retention_until:
                    type: string
                    format: date
        '404':
          description: Subscription not found

  /subscriptions/{subscription_id}/renew:
    post:
      summary: Manually renew subscription
      tags: [Subscriptions]
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method
              properties:
                payment_method:
                  type: string
                  enum: [jazzcash, easypaisa, card]
                billing_cycle:
                  type: string
                  enum: [monthly, six_month, yearly]
      responses:
        '200':
          description: Renewal initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_url:
                    type: string
                  transaction_id:
                    type: string
                    format: uuid
        '404':
          description: Subscription not found

  /subscriptions/{subscription_id}/upgrade:
    post:
      summary: Upgrade subscription tier
      tags: [Subscriptions]
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_plan_id
                - payment_method
              properties:
                new_plan_id:
                  type: string
                  format: uuid
                payment_method:
                  type: string
                  enum: [jazzcash, easypaisa, card]
      responses:
        '200':
          description: Upgrade initiated (prorated payment)
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment_url:
                    type: string
                  prorated_amount:
                    type: number
                    format: decimal
                  transaction_id:
                    type: string
                    format: uuid
        '400':
          description: Cannot downgrade or invalid tier
        '404':
          description: Subscription not found

  /subscriptions/{subscription_id}/usage:
    get:
      summary: Get subscription usage statistics
      tags: [Subscriptions]
      parameters:
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usage statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents_used:
                    type: integer
                  documents_limit:
                    type: integer
                    nullable: true
                  documents_percentage:
                    type: number
                    format: float
                  queries_used:
                    type: integer
                  queries_limit:
                    type: integer
                    nullable: true
                  queries_percentage:
                    type: number
                    format: float
                  storage_used_mb:
                    type: number
                    format: decimal
                  storage_limit_mb:
                    type: integer
                  storage_percentage:
                    type: number
                    format: float
                  warnings:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [approaching_limit, limit_reached, expiring_soon]
                        message:
                          type: string
                        threshold:
                          type: number
        '404':
          description: Subscription not found

  /payments/webhook/jazzcash:
    post:
      summary: JazzCash payment webhook
      tags: [Subscriptions]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid signature or payload

  /payments/webhook/easypaisa:
    post:
      summary: EasyPaisa payment webhook
      tags: [Subscriptions]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid signature or payload

  /payments/webhook/stripe:
    post:
      summary: Stripe payment webhook
      tags: [Subscriptions]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed
        '400':
          description: Invalid signature or payload

  /payments/transactions:
    get:
      summary: Get user payment history
      tags: [Subscriptions]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Payment transaction history
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: './openapi.yaml#/components/schemas/PaymentTransaction'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /payments/transactions/{transaction_id}:
    get:
      summary: Get transaction details
      tags: [Subscriptions]
      parameters:
        - name: transaction_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/PaymentTransaction'
        '404':
          description: Transaction not found

  /admin/plans:
    get:
      summary: Get all subscription plans (admin)
      tags: [Subscriptions, Admin]
      responses:
        '200':
          description: All subscription plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './openapi.yaml#/components/schemas/SubscriptionPlan'
        '403':
          description: Admin access required

    post:
      summary: Create new subscription plan (admin)
      tags: [Subscriptions, Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role_id
                - tier
                - monthly_price
              properties:
                role_id:
                  type: string
                  format: uuid
                tier:
                  type: string
                  enum: [basic, pro, premium]
                monthly_price:
                  type: number
                  format: decimal
                six_month_price:
                  type: number
                  format: decimal
                yearly_price:
                  type: number
                  format: decimal
                features:
                  type: object
                  properties:
                    documents_limit:
                      type: integer
                      nullable: true
                    queries_limit:
                      type: integer
                      nullable: true
                    storage_limit_mb:
                      type: integer
                    priority_support:
                      type: boolean
                    ai_model_tier:
                      type: string
                      enum: [basic, pro, premium]
                trial_duration_days:
                  type: integer
                  enum: [7, 14, 21, 30]
                trial_documents_limit:
                  type: integer
                trial_queries_limit:
                  type: integer
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/SubscriptionPlan'
        '400':
          description: Validation error
        '403':
          description: Admin access required
        '409':
          description: Plan already exists for role/tier

  /admin/plans/{plan_id}:
    put:
      summary: Update subscription plan (admin)
      tags: [Subscriptions, Admin]
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                monthly_price:
                  type: number
                  format: decimal
                six_month_price:
                  type: number
                  format: decimal
                yearly_price:
                  type: number
                  format: decimal
                features:
                  type: object
                trial_duration_days:
                  type: integer
                trial_documents_limit:
                  type: integer
                trial_queries_limit:
                  type: integer
      responses:
        '200':
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: './openapi.yaml#/components/schemas/SubscriptionPlan'
        '400':
          description: Validation error
        '403':
          description: Admin access required
        '404':
          description: Plan not found

    delete:
      summary: Delete subscription plan (admin)
      tags: [Subscriptions, Admin]
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan deleted
        '403':
          description: Admin access required
        '404':
          description: Plan not found
        '409':
          description: Cannot delete plan with active subscriptions
